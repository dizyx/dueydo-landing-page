server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets (Astro hashes filenames)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # .well-known — serve as JSON, no caching (values may change)
    location /.well-known/ {
        default_type application/json;
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Invite page — all /invite/* paths serve the invite page
    location ~ ^/invite(/|$) {
        try_files /invite/index.html =404;
    }

    # Astro SSG with i18n locale directories (e.g. /de/ → /de/index.html)
    location / {
        try_files $uri $uri/ $uri/index.html $uri.html /index.html;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
