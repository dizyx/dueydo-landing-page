<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Subtle radial gradient background -->
    <radialGradient id="bg-gradient" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1A1714" />
      <stop offset="100%" stop-color="#0F0D0A" />
    </radialGradient>

    <!-- Gold gradient for shield -->
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0C060" />
      <stop offset="50%" stop-color="#C9A84C" />
      <stop offset="100%" stop-color="#A68A3A" />
    </linearGradient>

    <!-- Subtle glow behind shield -->
    <radialGradient id="shield-glow" cx="50%" cy="42%" r="25%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-gradient)" />

  <!-- Subtle glow -->
  <rect width="1200" height="630" fill="url(#shield-glow)" />

  <!-- Decorative top/bottom gold lines -->
  <rect x="0" y="0" width="1200" height="3" fill="#C9A84C" opacity="0.4" />
  <rect x="0" y="627" width="1200" height="3" fill="#C9A84C" opacity="0.4" />

  <!-- Shield Logo (centered, upper portion) -->
  <g transform="translate(560, 100) scale(0.85)">
    <!-- Shield body -->
    <path d="M7 4 L93 4 Q100 4 100 11 L100 52 Q100 95 50 115 Q0 95 0 52 L0 11 Q0 4 7 4 Z"
          fill="#0F0D0A" stroke="url(#gold-gradient)" stroke-width="3" />

    <!-- Inner shield outline -->
    <path d="M14 11 L86 11 Q88 11 88 13 L88 50 Q88 89 50 106 Q12 89 12 50 L12 13 Q12 11 14 11 Z"
          fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.2" />

    <!-- D letter -->
    <text x="50" y="68" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="48" font-weight="700"
          fill="#C9A84C" opacity="0.9">D</text>
  </g>

  <!-- Brand Name -->
  <text x="600" y="340" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="72" font-weight="700"
        letter-spacing="12" fill="#F5F2EC">DUEYDO</text>

  <!-- Tagline -->
  <text x="600" y="395" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="24" font-style="italic"
        letter-spacing="2" fill="#C9A84C" opacity="0.8">Private secure chat for friends</text>

  <!-- Feature pills row -->
  <g transform="translate(600, 445)">
    <!-- Signal Protocol -->
    <g transform="translate(-280, 0)">
      <rect x="-75" y="-14" width="150" height="28" rx="14"
            fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.3" />
      <text x="0" y="5" text-anchor="middle"
            font-family="Arial, Helvetica, sans-serif"
            font-size="11" letter-spacing="2"
            fill="#C9A84C" opacity="0.6">SIGNAL PROTOCOL</text>
    </g>
    <!-- E2E Encrypted -->
    <g transform="translate(-93, 0)">
      <rect x="-75" y="-14" width="150" height="28" rx="14"
            fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.3" />
      <text x="0" y="5" text-anchor="middle"
            font-family="Arial, Helvetica, sans-serif"
            font-size="11" letter-spacing="2"
            fill="#C9A84C" opacity="0.6">E2E ENCRYPTED</text>
    </g>
    <!-- Auto-Delete -->
    <g transform="translate(93, 0)">
      <rect x="-75" y="-14" width="150" height="28" rx="14"
            fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.3" />
      <text x="0" y="5" text-anchor="middle"
            font-family="Arial, Helvetica, sans-serif"
            font-size="11" letter-spacing="2"
            fill="#C9A84C" opacity="0.6">AUTO-DELETE</text>
    </g>
    <!-- EU Hosted -->
    <g transform="translate(280, 0)">
      <rect x="-75" y="-14" width="150" height="28" rx="14"
            fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.3" />
      <text x="0" y="5" text-anchor="middle"
            font-family="Arial, Helvetica, sans-serif"
            font-size="11" letter-spacing="2"
            fill="#C9A84C" opacity="0.6">EU HOSTED</text>
    </g>
  </g>

  <!-- Coming Soon badge -->
  <g transform="translate(600, 520)">
    <rect x="-80" y="-16" width="160" height="32" rx="16"
          fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.5" />
    <circle cx="-55" cy="0" r="4" fill="#C9A84C" opacity="0.7" />
    <text x="5" y="5" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="12" letter-spacing="3"
          fill="#C9A84C" opacity="0.7">COMING SOON</text>
  </g>

  <!-- dizyx attribution -->
  <text x="600" y="605" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="12" letter-spacing="1"
        fill="#F5F2EC" opacity="0.25">dueydo.com</text>
</svg>